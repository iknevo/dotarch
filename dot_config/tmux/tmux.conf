set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'

set -g @resurrect-save 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

set -g @sessionx-bind 'o'
set -g @sessionx-filter-current 'false'
set -g @sessionx-preview-location 'top'
set -g @sessionx-preview-ratio '60%'
set -g @sessionx-window-mode 'off'
set -g @sessionx-tree-mode 'off'
set -g @sessionx-window-height '100%'
set -g @sessionx-window-width '100%'
set -g @sessionx-zoxide-mode 'on'

set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g history-limit 1000000
set -g escape-time 10
set -g detach-on-destroy off
set -g extended-keys on
set -g extended-keys-format csi-u
set -g allow-passthrough on
set -g visual-activity off
set -g display-time 1500
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on
setw -g aggressive-resize on

set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"
set-window-option -g mode-keys vi

WHITE="#FFFFFF"
RED="#ea6962"
GREEN="#a9b665"
YELLOW="#d8a657"
BLUE="#7daea3"
MAGENTA="#d3869b"
CYAN="#89b482"
BLACK="#1d2021"
DARK_GRAY="#32302F"
LIGHT_GRAY="#4F4946"
BG="#121212"
FG="#bebebe"

set -g @white "#FFFFFF"
set -g @red "#ea6962"
set -g @red_2 "#eba0ac"
set -g @green "#a9b665"
set -g @green_2 "#a6e3a1"
set -g @yellow "#d8a657"
set -g @yellow_2 "#f9e2af"
set -g @blue "#7daea3"
set -g @blue_2 "#89b4fa"
set -g @magenta "#d3869b"
set -g @cyan "#89b482"
set -g @black "#1d2021"
set -g @dark_gray "#32302F"
set -g @light_gray "#4F4946"
set -g @bg "#121212"
set -g @bg_2 "#1e1e2e"
set -g @fg "#bebebe"
set -g @fg_2 "#cdd6f4"
set -g @overlay "#6c7086"
set -g @surface "#45475a"

HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"

set -g status 2
set -g status-format[1] " "
set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 1
set -g status-style bg="default",fg=${FG}
set -g message-style bg="default",fg=${FG}
set -g mode-style "bg=#{@dark_gray},fg=#{@white}"
set -g pane-border-style "fg=#{@bg}"
set -g pane-active-border-style "fg=#{@light_gray}"

set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?pane_in_mode,#[fg=#{@red}],#{?client_prefix,#[fg=#{@surface}],#[fg=#{@green_2}]}}  #S "
set -ga status-left "#[fg=#{@overlay}]│"
set -ga status-left "#[fg=#{@blue_2}]  #{=/-32/...:#{b:pane_current_path}} "
set -ga status-left "#[fg=#{@overlay}]#{?window_zoomed_flag,│,}"
set -ga status-left "#[fg=#{@yellow_2}]#{?window_zoomed_flag,  zoom ,}"

set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[fg=#{@dark_gray},bg=default]${HALF_ROUND_OPEN}"
set -ga status-right "#[bg=#{@dark_gray},fg=#{@white}] %a %I:%M %p "
set -ga status-right "#[fg=#{@dark_gray},bg=default]${HALF_ROUND_CLOSE}"

set -g window-status-format ""
set -ga window-status-format " #I"
set -ga window-status-format "#[fg=#{@light_gray}]:"
set -ga window-status-format "#[fg=default]#W "

set -g window-status-separator ""
set -g window-status-current-format ""
set -ga window-status-current-format "#[fg=#{@dark_gray},bg=default]${HALF_ROUND_OPEN}"
set -ga window-status-current-format "#[bg=#{@dark_gray},fg=#{@white}]#I"
set -ga window-status-current-format "#[fg=#{@red}]:"
set -ga window-status-current-format "#[fg=#{@white}]#W"
set -ga window-status-current-format "#[fg=#{@dark_gray},bg=default]${HALF_ROUND_CLOSE}"


unbind C-b
set -g prefix C-f
bind C-f send-prefix

bind R command-prompt -I "#S" "rename-session -- '%%'"
bind N new-session -c "#{pane_current_path}"
bind X kill-session
bind Q kill-window

unbind c
unbind -n C-n
unbind -n C-p
unbind C-n
unbind C-p
unbind p

bind n new-window -c "#{pane_current_path}"
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind-key 0 last-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-H previous-window
bind -n M-L next-window

unbind %
unbind '"'
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind-key x kill-pane

unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
unbind C-h
unbind C-j
unbind C-k
unbind C-l

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5

bind-key v copy-mode
bind-key p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

##### useful popups #####

# music
bind m new-window -n "music" 'rmpc; tmux kill-window'

# git
bind g display-popup \
  -d "#{pane_current_path}" \
  -w 100% \
  -h 100% \
  -E "lazygit"


bind q source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded."
