set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @resurrect-save 'on'
# set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

set -g @sessionx-bind 'o'
set -g @sessionx-filter-current 'false'
set -g @sessionx-preview-location 'top'
set -g @sessionx-preview-ratio '60%'
set -g @sessionx-window-mode 'off'
set -g @sessionx-tree-mode 'off'
set -g @sessionx-window-height '100%'
set -g @sessionx-window-width '100%'
set -g @sessionx-zoxide-mode 'on'

run '~/.tmux/plugins/tpm/tpm'

set -g status 2
set -g status-format[1] " "
set -sg escape-time 0
set -g history-limit 1000000
set -g detach-on-destroy off

# General
set -g default-terminal "tmux-256color"
set -g mouse on
set -g focus-events on
set -g set-clipboard on
setw -g aggressive-resize on

# prefix to ctrl+f
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind N new-session -c "#{pane_current_path}"
bind X kill-session

# killing panes
bind-key x kill-pane

unbind -n C-n
unbind -n C-p
unbind C-n
unbind C-p
unbind p


bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5

# use prefix + vim keys to switch panes

bind-key 0 last-window
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# alt + 1:9 to switch tabs
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# use alt-H or alt-L to switch between windows
bind -n M-H previous-window
bind -n M-L next-window

unbind r
bind q source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded."
bind r command-prompt -I "#W" "rename-window -- '%%'"

set -g display-time 1500

# Undercurl
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g allow-passthrough on
set -g visual-activity off


unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
unbind C-h
unbind C-j
unbind C-k
unbind C-l

unbind %
unbind '"'
unbind c
bind n new-window -c "#{pane_current_path}"
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

# set vi-mode
set-window-option -g mode-keys vi
bind-key v copy-mode
bind-key p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle


# Styling + theme
WHITE="#FFFFFF"
RED="#ea6962"
GREEN="#a9b665"
YELLOW="#d8a657"
BLUE="#7daea3"
MAGENTA="#d3869b"
CYAN="#89b482"
BLACK="#1d2021"
DARK_GRAY="#32302F"
LIGHT_GRAY="#4F4946"
BG="#121212"
FG="#bebebe"

set -g @white "#FFFFFF"
set -g @red "#ea6962"
set -g @red_2 "#eba0ac"
set -g @green "#a9b665"
set -g @green_2 "#a6e3a1"
set -g @yellow "#d8a657"
set -g @yellow_2 "#f9e2af"
set -g @blue "#7daea3"
set -g @blue_2 "#89b4fa"
set -g @magenta "#d3869b"
set -g @cyan "#89b482"
set -g @black "#1d2021"
set -g @dark_gray "#32302F"
set -g @light_gray "#4F4946"
set -g @bg "#121212"
set -g @bg_2 "#1e1e2e"
set -g @fg "#bebebe"
set -g @fg_2 "#cdd6f4"
set -g @overlay "#6c7086"
set -g @surface "#45475a"

# Nerd font characters
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"


set -g status-style bg="default",fg=${FG}
set -g status-position top
set -g status-justify absolute-centre

# #{?client_prefix,YES,NO}

# left status
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[fg=#{@surface}]  #S },#{#[fg=#{@green_2}]  #S }}"
set -ga status-left "#[fg=#{@overlay}]│"
set -ga status-left "#[fg=#{@red_2}]  #{pane_current_command} "
set -ga status-left "#[fg=#{@overlay}]│"
set -ga status-left "#[fg=#{@blue_2}]  #{=/-32/...:#{b:pane_current_path}} "
set -ga status-left "#[fg=#{@overlay}]#{?window_zoomed_flag,│,}"
set -ga status-left "#[fg=#{@yellow_2}]#{?window_zoomed_flag,  zoom ,}"

# right status
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[fg=#{@dark_gray},bg=default]${HALF_ROUND_OPEN}"
set -ga status-right "#[bg=#{@dark_gray},fg=#{@white}] %I:%M %p "
set -ga status-right "#[fg=#{@dark_gray},bg=default]${HALF_ROUND_CLOSE}"

# windows
set -g window-status-format ""
set -ga window-status-format " #I"
set -ga window-status-format "#[fg=#{@light_gray}]:"
set -ga window-status-format "#[fg=default]#W "

# current active window
set -g window-status-separator ""
set -g window-status-current-format ""
set -ga window-status-current-format "#[fg=#{@dark_gray},bg=default]${HALF_ROUND_OPEN}"
set -ga window-status-current-format "#[bg=#{@dark_gray},fg=#{@white}]#I"
set -ga window-status-current-format "#[fg=#{@red}]:"
set -ga window-status-current-format "#[fg=#{@white}]#W"
set -ga window-status-current-format "#[fg=#{@dark_gray},bg=default]${HALF_ROUND_CLOSE}"
